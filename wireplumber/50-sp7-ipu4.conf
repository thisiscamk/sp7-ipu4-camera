# Surface Pro 7 IPU4: hide the ~55 raw V4L2 capture nodes the driver
# exposes. Apps get the cameras through wireplumber's libcamera monitor
# instead (simple pipeline + software ISP does the debayering); the raw
# nodes are useless to apps and opening them concurrently breaks
# captures.
#
# Install to /etc/wireplumber/wireplumber.conf.d/
# NB: match on device.name (udev bus path), not api.v4l2.cap.* — the
# cap properties are only filled in after the rules run.
monitor.v4l2.rules = [
  {
    matches = [
      { device.name = "~v4l2_device.*intel-ipu60.*" }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
]
